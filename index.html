<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校政热点简报 - 重庆德普外国语学校</title>
<style>
  :root {
    --dp-green-dark: #004844;
    --dp-green-mid: #065700;
    --dp-green-bright: #0DB900;
    --dp-green-light: #e8f5ee;
    --dp-green-bg: #f0f7f3;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    background: linear-gradient(160deg, #f0f7f3 0%, #e8f5ee 30%, #f5fff5 60%, #f9faf7 100%);
    min-height: 100vh;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }

  /* Header */
  .hero {
    background: linear-gradient(135deg, #003530 0%, #004844 40%, #065700 100%);
    color: #fff;
    border-radius: 20px;
    padding: 48px 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
    margin-bottom: 24px;
    box-shadow: 0 8px 40px rgba(0,72,68,0.15);
  }
  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: url('depu_logo_white.png') no-repeat center center;
    background-size: 240px auto;
    opacity: 0.10;
    pointer-events: none;
  }
  .hero-content { position: relative; z-index: 1; }
  .hero-tag {
    display: inline-block;
    background: rgba(255,255,255,0.16);
    backdrop-filter: blur(4px);
    padding: 4px 16px;
    border-radius: 20px;
    font-size: 12px;
    letter-spacing: 2px;
    margin-bottom: 14px;
  }
  .hero h1 {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .hero .subtitle {
    font-size: 14px;
    opacity: 0.85;
    margin-bottom: 20px;
  }
  .hero .today-btn {
    display: inline-block;
    background: linear-gradient(135deg, #0DB900, #065700);
    color: #fff;
    padding: 12px 32px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    text-decoration: none;
    transition: all 0.2s;
    border: 2px solid rgba(255,255,255,0.2);
    cursor: pointer;
  }
  .hero .today-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(13,185,0,0.35);
  }

  /* Calendar — month blocks */
  .calendar-card {
    background: #fff;
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 24px;
    box-shadow: 0 2px 12px rgba(0,72,68,0.06);
  }
  .calendar-card .cal-title {
    font-size: 15px;
    font-weight: 700;
    color: #004844;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .month-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 10px;
  }
  .month-cell {
    background: #f8faf8;
    border: 2px solid #e0ece3;
    border-radius: 14px;
    padding: 18px 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: block;
    color: inherit;
  }
  .month-cell:hover {
    background: #e8f5ee;
    border-color: #065700;
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,72,68,0.1);
  }
  .month-cell.current {
    border-color: #065700;
    background: linear-gradient(180deg, #f0f7f3, #e8f5ee);
  }
  .month-cell .month-name {
    font-size: 22px;
    font-weight: 800;
    color: #004844;
    line-height: 1;
    margin-bottom: 10px;
  }
  .month-cell .month-count {
    font-size: 12px;
    color: #6a8a6a;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .month-cell .month-count .m-dot {
    width: 7px; height: 7px;
    background: #0DB900;
    border-radius: 50%;
    display: inline-block;
  }
  .month-cell .month-count strong {
    color: #065700;
    font-size: 16px;
    font-weight: 700;
  }
  .month-cell.empty {
    cursor: default;
    opacity: 0.5;
    pointer-events: none;
  }
  .month-cell.empty .m-dot { background: #c0cec0; }

  /* Briefing summary */
  .list-card {
    background: #fff;
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 24px;
    box-shadow: 0 2px 12px rgba(0,72,68,0.06);
    text-align: center;
  }
  .list-card .list-title {
    font-size: 15px;
    font-weight: 700;
    color: #004844;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .briefing-summary {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .briefing-summary .stat {
    text-align: center;
  }
  .briefing-summary .stat .stat-num {
    font-size: 36px;
    font-weight: 800;
    color: #065700;
    line-height: 1;
  }
  .briefing-summary .stat .stat-label {
    font-size: 12px;
    color: #6a8a6a;
    margin-top: 4px;
  }
  .briefing-summary .stat-divider {
    width: 1px; height: 40px;
    background: #d0e0d0;
  }

  /* Info card */
  .info-card {
    background: linear-gradient(135deg, #f0f9f3, #e8f5ee);
    border-left: 4px solid #065700;
    border-radius: 0 12px 12px 0;
    padding: 16px 20px;
    margin-bottom: 24px;
    font-size: 13px;
    line-height: 1.7;
    color: #2a4a2a;
  }
  .info-card strong { color: #004844; }

  .footer-note {
    text-align: center;
    color: #8a9a8a;
    font-size: 12px;
    padding: 20px 0;
    line-height: 1.8;
  }
  .footer-note a { color: #065700; }

  .toast {
    position: fixed;
    top: 20px; left: 50%;
    transform: translateX(-50%);
    background: #004844;
    color: #fff;
    padding: 10px 24px;
    border-radius: 10px;
    font-size: 13px;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 600px) {
    .container { padding: 20px 12px 40px; }
    .hero { padding: 32px 18px; }
    .hero h1 { font-size: 22px; }
    .hero .today-btn { font-size: 14px; padding: 10px 24px; }
    .calendar-card { padding: 14px 16px; }
    .month-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="container">

  <!-- Hero -->
  <div class="hero">
    <div class="hero-content">
      <span class="hero-tag">DAILY BRIEFING</span>
      <h1>📰 校政热点简报</h1>
      <div class="subtitle">聚焦民办学校 · 国际学校 · 教育政策动态</div>
      <a class="today-btn" id="todayBtn" href="#">📋 查看今日简报</a>
    </div>
  </div>

  <!-- Calendar — month blocks -->
  <div class="calendar-card">
    <div class="cal-title">📅 浏览简报月份</div>
    <div class="month-grid" id="monthGrid"></div>
  </div>

  <!-- Briefing summary -->
  <div class="list-card">
    <div class="list-title">📚 已发布简报</div>
    <div class="briefing-summary">
      <div class="stat">
        <div class="stat-num" id="totalCount">0</div>
        <div class="stat-label">累计简报期数</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-num" id="monthCount">0</div>
        <div class="stat-label">覆盖月份</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-num" id="latestDate">—</div>
        <div class="stat-label">最新一期</div>
      </div>
    </div>
  </div>

  <!-- Info -->
  <div class="info-card">
    <strong>💡 使用说明：</strong>点击日历日期或列表中的简报即可查看当天完整内容。本页面每日约<strong>9:00</strong>自动更新，覆盖<b>教育部/重庆市教委/IBO/剑桥考评部/College Board</b>等权威来源。如当日简报尚未生成，请稍后再试。
  </div>

  <div class="footer-note">
    重庆德普外国语学校 · 校政热点简报中心<br>
    信息来源：教育部 / 重庆市教委 / IBO / 中国民办教育协会 等权威渠道
  </div>
</div>

<script>
(function() {
  var EMBEDDED_DATES = ["2026-06-18","2026-06-19","2026-06-20","2026-06-21","2026-06-22","2026-06-23","2026-06-24","2026-06-25","2026-06-26","2026-06-27","2026-06-28","2026-06-29","2026-06-30","2026-07-01","2026-07-02"];
  var availableDates = [];

  function getTodayStr() { return new Date().toISOString().slice(0,10); }
  function parseDate(str) {
    var p = str.split('-');
    return new Date(+p[0], +p[1]-1, +p[2]);
  }

  // Today button
  (function() {
    var today = getTodayStr();
    var btn = document.getElementById('todayBtn');
    btn.href = '校政热点简报_' + today + '.html';
  })();

  // Build a map of month → [dates]
  function buildMonthMap(dates) {
    var map = {};
    for (var i = 0; i < dates.length; i++) {
      var parts = dates[i].split('-');
      var key = parts[0] + '-' + parts[1]; // e.g. "2026-06"
      if (!map[key]) map[key] = [];
      map[key].push(dates[i]);
    }
    // Sort each month's dates
    for (var k in map) { map[k].sort(); }
    return map;
  }

  // Render month blocks
  function renderMonthGrid(dates) {
    var grid = document.getElementById('monthGrid');
    var monthMap = buildMonthMap(dates);
    var months = Object.keys(monthMap).sort();

    if (months.length === 0) {
      grid.innerHTML = '<div style="text-align:center;color:#8a9a8a;padding:20px;grid-column:1/-1;">暂无简报</div>';
      return;
    }

    var today = getTodayStr();
    var todayMonth = today.slice(0, 7); // "2026-07"

    // Determine date range to show (from earliest to latest + potentially future months)
    var firstMonth = months[0];
    var lastMonth = months[months.length - 1];
    // Also include current month if it's beyond last month with data
    if (todayMonth > lastMonth) lastMonth = todayMonth;

    // Generate all months from first to last
    var allMonths = [];
    var fmParts = firstMonth.split('-');
    var lmParts = lastMonth.split('-');
    var fy = +fmParts[0], fm = +fmParts[1] - 1;
    var ly = +lmParts[0], lm = +lmParts[1] - 1;

    var y = fy, m = fm;
    while (y < ly || (y === ly && m <= lm)) {
      var key = y + '-' + String(m + 1).padStart(2, '0');
      allMonths.push({ key: key, year: y, month: m, count: monthMap[key] ? monthMap[key].length : 0, dates: monthMap[key] || [] });
      m++;
      if (m > 11) { m = 0; y++; }
    }

    var html = '';
    for (var i = 0; i < allMonths.length; i++) {
      var mon = allMonths[i];
      var isCurrent = mon.key === todayMonth;
      var hasData = mon.count > 0;
      var cnName = (mon.month + 1) + '月';

      if (!hasData && !isCurrent) {
        // Skip empty non-current months (keep it compact)
        continue;
      }

      var cls = ['month-cell'];
      if (isCurrent) cls.push('current');
      if (!hasData) cls.push('empty');

      var href = hasData
        ? 'href="校政热点简报_' + mon.dates[mon.dates.length - 1] + '.html"'
        : '';

      html += '<a class="' + cls.join(' ') + '" ' + href + '>';
      html += '<div class="month-name">' + cnName + '</div>';
      html += '<div class="month-count">';
      if (hasData) {
        html += '<span class="m-dot"></span> <strong>' + mon.count + '</strong> 期简报';
      } else {
        html += '<span style="color:#a0b8a0;">暂无简报</span>';
      }
      html += '</div>';
      html += '</a>';
    }

    grid.innerHTML = html;
  }

  // Render summary stats
  function renderSummary(dates) {
    var monthMap = buildMonthMap(dates);
    var totalMonths = Object.keys(monthMap).length;

    document.getElementById('totalCount').textContent = dates.length;
    document.getElementById('monthCount').textContent = totalMonths;

    if (dates.length > 0) {
      var sorted = dates.slice().sort();
      var latest = sorted[sorted.length - 1];
      var d = parseDate(latest);
      document.getElementById('latestDate').textContent = (d.getMonth() + 1) + '/' + d.getDate();
    }
  }

  // Init
  if (EMBEDDED_DATES.length > 0) {
    availableDates = EMBEDDED_DATES;
    renderMonthGrid(availableDates);
    renderSummary(availableDates);
  }

  fetch('briefings_manifest.json').then(function(r){ return r.json(); }).then(function(data){
    if (data.dates && data.dates.length > 0) {
      availableDates = data.dates;
      renderMonthGrid(availableDates);
      renderSummary(availableDates);
      // Update today button
      var today = getTodayStr();
      if (data.dates.indexOf(today) === -1) {
        var sorted = data.dates.slice().sort();
        document.getElementById('todayBtn').textContent = '📋 查看最新简报';
        document.getElementById('todayBtn').href = '校政热点简报_' + sorted[sorted.length - 1] + '.html';
      }
    }
  }).catch(function(){});
})();
</script>

</body>
</html>
