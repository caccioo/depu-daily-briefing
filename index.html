<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校政热点简报 - 德普外国语学校</title>
<style>
  :root {
    --dp-green-dark: #004844;
    --dp-green-mid: #065700;
    --dp-green-bright: #0DB900;
    --dp-green-light: #e8f5ee;
    --dp-green-bg: #f0f7f3;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    background: linear-gradient(160deg, #f0f7f3 0%, #e8f5ee 30%, #f5fff5 60%, #f9faf7 100%);
    min-height: 100vh;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }

  /* Header */
  .hero {
    background: linear-gradient(135deg, #003530 0%, #004844 40%, #065700 100%);
    color: #fff;
    border-radius: 20px;
    padding: 48px 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
    margin-bottom: 24px;
    box-shadow: 0 8px 40px rgba(0,72,68,0.15);
  }
  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: url('depu_logo_white.png') no-repeat center center;
    background-size: 240px auto;
    opacity: 0.10;
    pointer-events: none;
  }
  .hero-content { position: relative; z-index: 1; }
  .hero-tag {
    display: inline-block;
    background: rgba(255,255,255,0.16);
    backdrop-filter: blur(4px);
    padding: 4px 16px;
    border-radius: 20px;
    font-size: 12px;
    letter-spacing: 2px;
    margin-bottom: 14px;
  }
  .hero h1 {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .hero .subtitle {
    font-size: 14px;
    opacity: 0.85;
    margin-bottom: 20px;
  }
  .hero .today-btn {
    display: inline-block;
    background: linear-gradient(135deg, #0DB900, #065700);
    color: #fff;
    padding: 12px 32px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    text-decoration: none;
    transition: all 0.2s;
    border: 2px solid rgba(255,255,255,0.2);
    cursor: pointer;
  }
  .hero .today-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(13,185,0,0.35);
  }

  /* Calendar */
  .calendar-card {
    background: #fff;
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 24px;
    box-shadow: 0 2px 12px rgba(0,72,68,0.06);
  }
  .calendar-card .cal-title {
    font-size: 15px;
    font-weight: 700;
    color: #004844;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .calendar-card .weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-size: 11px;
    color: #8a9a8a;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .calendar-card .weekdays span:first-child,
  .calendar-card .weekdays span:last-child { color: #c0392b; }
  .calendar-card .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .calendar-card .day-cell {
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-size: 13px;
    color: #3a4a3a;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid transparent;
    font-weight: 500;
    min-height: 34px;
    position: relative;
  }
  .calendar-card .day-cell:hover { background: #e8f5ee; border-color: #b0d0b8; }
  .calendar-card .day-cell.empty { cursor: default; background: transparent; border-color: transparent; }
  .calendar-card .day-cell.empty:hover { background: transparent; border-color: transparent; }
  .calendar-card .day-cell.today {
    background: linear-gradient(135deg, #004844, #065700);
    color: #fff;
    font-weight: 700;
  }
  .calendar-card .day-cell.today:hover { opacity: 0.9; }
  .calendar-card .day-cell.has-briefing::after {
    content: "";
    position: absolute;
    bottom: 3px;
    width: 4px; height: 4px;
    background: #0DB900;
    border-radius: 50%;
  }
  .calendar-card .day-cell.today.has-briefing::after { background: #fff; }
  .calendar-card .day-cell.future { color: #c0cec0; cursor: default; }
  .calendar-card .day-cell.future:hover { background: transparent; border-color: transparent; }

  /* Briefing list */
  .list-card {
    background: #fff;
    border-radius: 16px;
    padding: 20px 24px;
    margin-bottom: 24px;
    box-shadow: 0 2px 12px rgba(0,72,68,0.06);
  }
  .list-card .list-title {
    font-size: 15px;
    font-weight: 700;
    color: #004844;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .briefing-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-radius: 10px;
    margin-bottom: 6px;
    transition: all 0.15s;
    text-decoration: none;
    color: #2a3a2a;
    border: 1px solid transparent;
  }
  .briefing-item:hover {
    background: #f0f7f3;
    border-color: #a0d0b0;
  }
  .briefing-item .bi-date {
    font-weight: 600;
    font-size: 14px;
    color: #004844;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .briefing-item .bi-date .dot {
    width: 8px; height: 8px;
    background: #0DB900;
    border-radius: 50%;
  }
  .briefing-item .bi-arrow {
    color: #065700;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.15s, transform 0.15s;
  }
  .briefing-item:hover .bi-arrow { opacity: 1; transform: translateX(4px); }
  .briefing-item .bi-today-badge {
    background: #065700;
    color: #fff;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }

  /* Info card */
  .info-card {
    background: linear-gradient(135deg, #f0f9f3, #e8f5ee);
    border-left: 4px solid #065700;
    border-radius: 0 12px 12px 0;
    padding: 16px 20px;
    margin-bottom: 24px;
    font-size: 13px;
    line-height: 1.7;
    color: #2a4a2a;
  }
  .info-card strong { color: #004844; }

  .footer-note {
    text-align: center;
    color: #8a9a8a;
    font-size: 12px;
    padding: 20px 0;
    line-height: 1.8;
  }
  .footer-note a { color: #065700; }

  .toast {
    position: fixed;
    top: 20px; left: 50%;
    transform: translateX(-50%);
    background: #004844;
    color: #fff;
    padding: 10px 24px;
    border-radius: 10px;
    font-size: 13px;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 600px) {
    .container { padding: 20px 12px 40px; }
    .hero { padding: 32px 18px; }
    .hero h1 { font-size: 22px; }
    .hero .today-btn { font-size: 14px; padding: 10px 24px; }
    .calendar-card { padding: 14px 16px; }
    .calendar-card .day-cell { font-size: 11px; min-height: 28px; }
  }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="container">

  <!-- Hero -->
  <div class="hero">
    <div class="hero-content">
      <span class="hero-tag">DAILY BRIEFING</span>
      <h1>📰 校政热点简报</h1>
      <div class="subtitle">聚焦民办学校 · 国际学校 · 教育政策动态</div>
      <a class="today-btn" id="todayBtn" href="#">📋 查看今日简报</a>
    </div>
  </div>

  <!-- Calendar -->
  <div class="calendar-card">
    <div class="cal-title">📅 浏览简报日历</div>
    <div class="weekdays">
      <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
    </div>
    <div class="days-grid" id="daysGrid"></div>
  </div>

  <!-- Briefing list -->
  <div class="list-card">
    <div class="list-title">📚 已发布简报列表</div>
    <div id="briefingList"></div>
  </div>

  <!-- Info -->
  <div class="info-card">
    <strong>💡 使用说明：</strong>点击日历日期或列表中的简报即可查看当天完整内容。本页面每日约<strong>9:00</strong>自动更新，覆盖<b>教育部/重庆市教委/IBO/剑桥考评部/College Board</b>等权威来源。如当日简报尚未生成，请稍后再试。
  </div>

  <div class="footer-note">
    德普外国语学校 · 校政热点简报中心<br>
    信息来源：教育部 / 重庆市教委 / IBO / 中国民办教育协会 等权威渠道
  </div>
</div>

<script>
(function() {
  var EMBEDDED_DATES = ["2026-06-18","2026-06-22","2026-06-23","2026-06-24","2026-06-25","2026-06-26"];
  var availableDates = [];

  function getTodayStr() { return new Date().toISOString().slice(0,10); }
  function parseDate(str) {
    var p = str.split('-');
    return new Date(+p[0], +p[1]-1, +p[2]);
  }
  function formatDateCN(str) {
    var d = parseDate(str);
    var w = ['日','一','二','三','四','五','六'];
    return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 星期'+w[d.getDay()];
  }
  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._tid);
    t._tid = setTimeout(function(){ t.classList.remove('show'); }, 2000);
  }

  // Today button
  (function() {
    var today = getTodayStr();
    var btn = document.getElementById('todayBtn');
    btn.href = '校政热点简报_' + today + '.html';
  })();

  // Render calendar for current month
  function renderCalendar() {
    var grid = document.getElementById('daysGrid');
    var today = getTodayStr();
    var td = parseDate(today);
    var year = td.getFullYear();
    var month = td.getMonth();
    var firstDay = new Date(year, month, 1);
    var lastDay = new Date(year, month+1, 0);
    var totalDays = lastDay.getDate();
    var startDow = firstDay.getDay();

    var html = '';
    for (var i=0; i<startDow; i++) { html += '<div class="day-cell empty"></div>'; }
    for (var d=1; d<=totalDays; d++) {
      var ds = year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      var isToday = ds===today;
      var hasBrf = availableDates.indexOf(ds) !== -1;
      var isFuture = new Date(year, month, d) > new Date(today);

      var cls = ['day-cell'];
      if (isToday) cls.push('today');
      if (hasBrf) cls.push('has-briefing');
      if (isFuture) cls.push('future');

      html += '<div class="'+cls.join(' ')+'" data-date="'+ds+'">'+d+'</div>';
    }
    var remaining = (7 - ((startDow+totalDays)%7)) % 7;
    for (var i=0; i<remaining; i++) { html += '<div class="day-cell empty"></div>'; }

    grid.innerHTML = html;
    var cells = grid.querySelectorAll('.day-cell:not(.empty)');
    for (var i=0; i<cells.length; i++) {
      cells[i].addEventListener('click', function(){
        var ds = this.dataset.date;
        if (ds > today) { showToast('⚠ ' + ds + ' 尚未到来'); return; }
        window.location.href = '校政热点简报_' + ds + '.html';
      });
    }
  }

  // Render briefing list
  function renderList() {
    var listEl = document.getElementById('briefingList');
    var today = getTodayStr();
    if (availableDates.length === 0) {
      listEl.innerHTML = '<div style="text-align:center;color:#8a9a8a;padding:20px;">暂无简报数据</div>';
      return;
    }
    // Sort newest first
    var sorted = availableDates.slice().sort().reverse();
    var html = '';
    for (var i=0; i<sorted.length; i++) {
      var ds = sorted[i];
      var isToday = ds === today;
      html += '<a class="briefing-item" href="校政热点简报_' + ds + '.html">';
      html += '<span class="bi-date"><span class="dot"></span>' + formatDateCN(ds) + '</span>';
      html += '<span style="display:flex;align-items:center;gap:8px;">';
      if (isToday) html += '<span class="bi-today-badge">今天</span>';
      html += '<span class="bi-arrow">查看 →</span></span>';
      html += '</a>';
    }
    listEl.innerHTML = html;
  }

  // Init
  if (EMBEDDED_DATES.length > 0) {
    availableDates = EMBEDDED_DATES;
    renderCalendar();
    renderList();
  }

  fetch('briefings_manifest.json').then(function(r){ return r.json(); }).then(function(data){
    if (data.dates && data.dates.length > 0) {
      availableDates = data.dates;
      renderCalendar();
      renderList();
      // Update today button href
      var today = getTodayStr();
      if (data.dates.indexOf(today) !== -1) {
        document.getElementById('todayBtn').textContent = '📋 查看今日简报';
      } else {
        document.getElementById('todayBtn').textContent = '📋 查看最新简报';
        document.getElementById('todayBtn').href = '校政热点简报_' + data.dates[data.dates.length-1] + '.html';
      }
    }
  }).catch(function(){});
})();
</script>

</body>
</html>
